name: Protected Training Job

# This is the "real" workload the whole project protects — a stand-in for
# a model training run or deployment. It can be started manually (for the
# demo) or re-triggered automatically by risk-listener.yml once the
# Orchestrator (Member 2) signals the outage risk has cleared.

on:
  workflow_dispatch:
    inputs:
      resume_from_checkpoint:
        description: "Resume from Member 3's last checkpoint?"
        required: false
        default: "false"
        type: boolean

# Only one training run at a time. cancel-in-progress is false here because
# WE want to control cancellation ourselves (from risk-listener.yml), not
# have a fresh manual trigger silently kill a run.
concurrency:
  group: grid-resilient-training
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read current grid-risk state
        id: risk
        run: |
          STATE_FILE=".grid-resilient/state.json"
          if [ -f "$STATE_FILE" ]; then
            STATUS=$(jq -r '.status // "normal"' "$STATE_FILE")
          else
            STATUS="normal"
          fi
          echo "Current risk status: $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Refuse to start a fresh run while risk is high
        if: steps.risk.outputs.status == 'paused' && inputs.resume_from_checkpoint != 'true'
        run: |
          echo "::error::Grid risk is currently HIGH (state=paused). Refusing to start a new run. Wait for grid_risk_clear from the Orchestrator."
          exit 1

      - name: Restore last checkpoint (Member 3)
        if: inputs.resume_from_checkpoint == 'true'
        run: |
          echo "Resuming from last checkpoint via Member 3's checkpoint service..."
          # Placeholder — wire this to Member 3's real resume endpoint, e.g.:
          # curl -sf -X POST "$CHECKPOINT_SERVICE_URL/resume"
          echo "(placeholder) checkpoint restored, continuing from last saved step"

      - name: Run the protected job
        run: |
          echo "Training/deployment job running..."
          # Placeholder for Member 3's real workload (e.g. `python train.py`).
          # Keep this step SHORT for demo purposes so it's easy to interrupt
          # live on stage with a grid_risk_high dispatch.
          for i in $(seq 1 30); do
            echo "step $i/30..."
            sleep 2
          done
          echo "Job finished normally."
