name: Grid Risk Listener

on:
  repository_dispatch:
    types: [grid_risk_high, grid_risk_clear]

permissions:
  contents: write
  actions: write

jobs:
  handle-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write new state
        run: |
          mkdir -p .grid-resilient
          if [ "${{ github.event.action }}" = "grid_risk_high" ]; then
            STATUS="paused"
          else
            STATUS="normal"
          fi
          cat > .grid-resilient/state.json <<EOF
          {"status": "$STATUS", "updated_at": "$(date -u +%FT%TZ)", "event": "${{ github.event.action }}"}
          EOF
          echo "New state: $STATUS"

      - name: Commit state file
        run: |
          git config user.name "grid-resilient-bot"
          git config user.email "bot@grid-resilient.local"
          git add .grid-resilient/state.json
          git commit -m "risk state -> ${{ github.event.action }}" || echo "no changes to commit"
          git push

      - name: Cancel any in-progress training run
        if: github.event.action == 'grid_risk_high'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Outage risk HIGH — pausing the pipeline."
          RUN_IDS=$(gh run list --workflow=training-job.yml --status=in_progress --json databaseId -q '.[].databaseId')
          if [ -z "$RUN_IDS" ]; then
            echo "No in-progress training run to cancel."
          else
            for id in $RUN_IDS; do
              echo "Cancelling run $id"
              gh run cancel "$id"
            done
          fi

      - name: Re-trigger training job to resume
        if: github.event.action == 'grid_risk_clear'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Outage risk CLEAR — resuming the pipeline."
          gh workflow run training-job.yml -f resume_from_checkpoint=true
