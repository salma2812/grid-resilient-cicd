name: Protected Training Job

on:
  workflow_dispatch:
    inputs:
      resume_from_checkpoint:
        description: "Resume from Member 3's last checkpoint?"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: grid-resilient-training
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read current grid-risk state
        id: risk
        run: |
          STATE_FILE=".grid-resilient/state.json"
          if [ -f "$STATE_FILE" ]; then
            STATUS=$(jq -r '.status // "normal"' "$STATE_FILE")
          else
            STATUS="normal"
          fi
          echo "Current risk status: $STATUS"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Refuse to start a fresh run while risk is high
        if: steps.risk.outputs.status == 'paused' && inputs.resume_from_checkpoint != 'true'
        run: |
          echo "::error::Grid risk is currently HIGH (state=paused). Refusing to start a new run. Wait for grid_risk_clear from the Orchestrator."
          exit 1

      - name: Restore last checkpoint (Member 3)
        if: inputs.resume_from_checkpoint == 'true'
        run: |
          echo "Resuming from last checkpoint via Member 3's checkpoint service..."
          echo "(placeholder) checkpoint restored, continuing from last saved step"

      - name: Run the protected job
        run: |
          echo "Training/deployment job running..."
          for i in $(seq 1 30); do
            echo "step $i/30..."
            sleep 2
          done
          echo "Job finished normally."
